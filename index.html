<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Cyber Snake v6.8 - Online Firebase</title>
    
    <!-- Import Firebase SDK via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBAGg6pz4hkVLdf3LzPf-HZ8LnFuv4tiTU",
            authDomain: "cyber-nunk-snake.firebaseapp.com",
            databaseURL: "https://cyber-nunk-snake-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cyber-nunk-snake",
            storageBucket: "cyber-nunk-snake.firebasestorage.app",
            messagingSenderId: "407475842406",
            appId: "1:407475842406:web:2d796535a40404e162eca7",
            measurementId: "G-Z8RJ50PNH8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.loadHighScoreFromFirebase = async function() {
            try {
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, 'highScore'));
                if (snapshot.exists()) {
                    return parseInt(snapshot.val()) || 0;
                } else {
                    return 0;
                }
            } catch (error) {
                console.error("Gagal memuat High Score:", error);
                return 0;
            }
        };

        window.saveHighScoreToFirebase = async function(score) {
            try {
                await set(ref(db, 'highScore'), score);
            } catch (error) {
                console.error("Gagal menyimpan High Score:", error);
            }
        };
    </script>

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #06060c;
            color: #00ffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #info-panel {
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            background: rgba(10, 10, 25, 0.9);
            border-bottom: 2px solid rgba(0, 255, 255, 0.3);
            z-index: 20;
            flex-shrink: 0;
        }

        .hud-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .hud-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 5px;
            border: 1px dashed rgba(0, 255, 255, 0.5);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        #hi-score-box {
            border-color: #ffaa00;
            color: #ffaa00;
        }

        #mute-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            border-radius: 5px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 13px;
        }

        #game-area {
            flex: 1;
            position: relative;
            background-color: #020205;
            padding: 4px;
            touch-action: none;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #status-bar {
            height: 30px;
            background: #05050c;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: rgba(0, 255, 255, 0.4);
            flex-shrink: 0;
        }

        .signature {
            color: #ff0055;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 1px;
        }

        #cyber-alert {
            display: block;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 320px;
            background: rgba(10, 10, 30, 0.95);
            border: 2px solid #00ffff;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4);
            z-index: 100;
        }

        #alert-title {
            font-size: 16px;
            font-weight: bold;
            color: #ff0055;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        #alert-msg {
            font-size: 12px;
            color: #ffffff;
            margin-bottom: 15px;
            line-height: 1.4;
            white-space: pre-line;
        }

        .cyber-btn {
            background: transparent;
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 8px 25px;
            font-family: inherit;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        .cyber-btn:active {
            background: #00ffff;
            color: #06060c;
        }
    </style>
</head>
<body>

    <div id="info-panel">
        <div class="hud-box" id="level-txt">LVL: 01</div>
        <div class="hud-box" id="hi-score-box">HI: LOADING...</div>
        <div class="hud-group">
            <div class="hud-box" id="skor-txt">FEED: 00/10</div>
            <button id="mute-btn">🔊</button>
        </div>
    </div>
    
    <div id="game-area">
        <canvas id="gameCanvas"></canvas>
        
        <div id="cyber-alert">
            <div id="alert-title">NEON CYBER SNAKE</div>
            <div id="alert-msg">Menghubungkan ke Database...</div>
            <button class="cyber-btn" id="alert-btn" style="display:none;">OK</button>
        </div>
    </div>

    <div id="status-bar">
        <div>TAP TO PAUSE // SWIPE TO MOVE</div>
        <div class="signature">MADE BY NUNK13</div>
    </div>

    <!-- PANGGAL FILE SCRIPT JS EXTERNAL -->
    <script src="script.js"></script>
</body>
</html>
